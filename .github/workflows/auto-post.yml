name: Auto Generate Daily Blog Post

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 한국시간 오전 7시 (UTC 22:00 전날)
  workflow_dispatch:       # 수동 실행 버튼
  repository_dispatch:     # 외부 크론 서비스(cron-job.org)에서 강제 호출 가능
    types: [run-auto-post]

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20    # 지수 백오프 재시도 시간 여유 확보 (15→20분)
    permissions:
      contents: write      # 자동 작성된 글을 저장소에 커밋/푸시할 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog-post.js

      - name: Prebuild
        run: node scripts/prebuild.js

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-post [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "새 글 없음 (중복 슬러그 방지)"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=claimworks-blog --branch=main
