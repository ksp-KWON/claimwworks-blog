name: Auto Generate Daily Blog Post

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/generate-blog-post.py

      - name: Setup Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Run prebuild
        if: always()
        run: |
          npm install gray-matter --no-save
          node scripts/prebuild.js

      - name: Commit and push
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate daily blog post (or debug log) [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "변경사항 없음"
          fi

      - name: Install dependencies for build
        if: success()
        run: npm install --legacy-peer-deps

      - name: Build static site
        if: success()
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=claimworks-blog --branch=main
