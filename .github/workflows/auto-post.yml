name: Auto Generate Daily Blog Post

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 한국시간 오전 7시 (UTC 22:00 전날)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/generate-blog-post.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install & Prebuild
        run: |
          npm ci
          node scripts/prebuild.js

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-post [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "새 글 없음"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=claimworks-blog --branch=main
