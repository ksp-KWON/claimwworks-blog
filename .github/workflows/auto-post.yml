name: Auto Generate Daily Blog Post

on:
  schedule:
    # 한국 시간(KST) 매일 아침 07:00 실행 (UTC 기준 전날 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── STEP 1: 코드 체크아웃 ──
      - name: "[1/6] Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── STEP 2: Node.js 설정 ──
      - name: "[2/6] Setup Node.js 24"
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ── STEP 3: 환경 진단 (어디서 오류나는지 파악용) ──
      - name: "[3/6] Diagnose environment"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== 환경 진단 시작 ==="
          echo "Node 버전: $(node --version)"
          echo "npm 버전: $(npm --version)"
          echo "작업 디렉토리: $(pwd)"
          echo "파일 목록:"
          ls -la
          echo ""
          echo "scripts 폴더:"
          ls -la scripts/
          echo ""
          echo "posts 폴더:"
          ls -la src/content/posts/ || echo "(폴더 없음)"
          echo ""
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY 상태: 설정 안됨!"
          else
            KEY_LEN=${#GEMINI_API_KEY}
            echo "✅ GEMINI_API_KEY 상태: 설정됨 (길이: ${KEY_LEN}자)"
          fi
          echo "=== 환경 진단 완료 ==="

      # ── STEP 4: 의존성 설치 ──
      - name: "[4/6] Install dependencies"
        run: |
          echo "=== npm 설치 시작 ==="
          npm install
          echo "=== npm 설치 완료 ==="
          echo "설치된 패키지 확인:"
          node -e "require('gray-matter'); console.log('gray-matter: OK')"

      # ── STEP 5: 블로그 글 자동 생성 ──
      - name: "[5/6] Generate Blog Post with Gemini AI"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== 자동글쓰기 시작 ==="
          node scripts/generate-blog-post.js
          echo "=== 자동글쓰기 완료 ==="
          echo "생성된 파일 확인:"
          ls -la src/content/posts/

      # ── STEP 5b: prebuild (posts-data.json 갱신) ──
      - name: "[5b/6] Run prebuild"
        run: |
          echo "=== prebuild 시작 ==="
          node scripts/prebuild.js
          echo "=== prebuild 완료 ==="

      # ── STEP 6: Git 커밋 & 푸시 ──
      - name: "[6/6] Commit and push"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate daily blog post [$(date +'%Y-%m-%d')]"
            git push
            echo "✅ 커밋 & 푸시 완료"
          else
            echo "변경사항 없음 - 커밋 생략"
          fi
